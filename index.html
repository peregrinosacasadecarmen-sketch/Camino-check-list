<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Pellegrino – Camino de Santiago</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1410;
    --rust: #a84a2a;
    --rust-light: #c96040;
    --gold: #c4922a;
    --gold-pale: #e8c97a;
    --parch: #f2ead8;
    --parch-dark: #e2d4b8;
    --stone: #8a7a6a;
    --fog: #b8a898;
    --white: #faf7f2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; background: var(--white); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }
  .hero { background: var(--ink); color: var(--parch); padding: 2.8rem 2rem 2.2rem; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 50%, rgba(196,146,42,0.18) 0%, transparent 60%), radial-gradient(ellipse at 10% 80%, rgba(168,74,42,0.14) 0%, transparent 50%); pointer-events: none; }
  .hero-inner { position: relative; max-width: 560px; margin: 0 auto; }
  .route-label { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-pale); margin-bottom: 0.8rem; opacity: 0; animation: slideIn 0.6s 0.1s ease forwards; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 600; line-height: 1.05; color: var(--white); opacity: 0; animation: slideIn 0.6s 0.2s ease forwards; }
  .hero h1 em { font-style: italic; color: var(--gold-pale); }
  .hero-sub { margin-top: 0.5rem; font-size: 0.85rem; color: var(--fog); font-weight: 300; opacity: 0; animation: slideIn 0.6s 0.3s ease forwards; }
  .progress-area { margin-top: 1.6rem; opacity: 0; animation: slideIn 0.6s 0.4s ease forwards; }
  .progress-track { height: 2px; background: rgba(255,255,255,0.12); border-radius: 1px; overflow: hidden; margin-bottom: 0.5rem; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--rust-light), var(--gold)); border-radius: 1px; width: 0%; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .progress-meta { display: flex; justify-content: space-between; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fog); }
  .progress-pct { color: var(--gold-pale); font-weight: 500; transition: color 0.3s; }
  .body { max-width: 560px; margin: 0 auto; padding: 0 1.4rem 3rem; }
  .category { margin-top: 2rem; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards; }
  .category:nth-child(1) { animation-delay: 0.5s; }
  .category:nth-child(2) { animation-delay: 0.62s; }
  .category:nth-child(3) { animation-delay: 0.74s; }
  .category:nth-child(4) { animation-delay: 0.86s; }
  .category:nth-child(5) { animation-delay: 0.98s; }
  .cat-head { display: flex; align-items: center; gap: 0.7rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--parch-dark); margin-bottom: 0.3rem; }
  .cat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rust); flex-shrink: 0; transition: background 0.3s; }
  .cat-head.all-done .cat-dot { background: var(--gold); }
  .cat-name { font-family: 'Cormorant Garamond', serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rust); transition: color 0.3s; }
  .cat-head.all-done .cat-name { color: var(--gold); }
  .cat-icon { font-size: 0.95rem; margin-left: auto; opacity: 0.7; }
  .cat-tally { font-size: 0.68rem; letter-spacing: 0.08em; color: var(--fog); margin-left: 0.3rem; }
  .item { display: flex; align-items: flex-start; gap: 0.85rem; padding: 0.65rem 0.5rem; cursor: pointer; border-radius: 4px; transition: background 0.15s; position: relative; }
  .item:hover { background: rgba(168,74,42,0.04); }
  .item:active { background: rgba(168,74,42,0.08); }
  .cb-wrap { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; position: relative; }
  .cb-wrap input { display: none; }
  .cb-box { position: absolute; inset: 0; border: 1.5px solid var(--fog); border-radius: 3px; background: transparent; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; justify-content: center; }
  .cb-check { opacity: 0; transform: scale(0.4) rotate(-10deg); transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .cb-check svg { width: 11px; height: 11px; stroke: white; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .item.done .cb-box { background: var(--rust); border-color: var(--rust); }
  .item.done .cb-check { opacity: 1; transform: scale(1) rotate(0deg); }
  .item-body { flex: 1; min-width: 0; }
  .item-label { font-size: 0.97rem; font-weight: 400; line-height: 1.4; color: var(--ink); transition: color 0.25s; }
  .item.done .item-label { color: var(--fog); text-decoration: line-through; text-decoration-color: rgba(168,74,42,0.4); }
  .item-hint { font-size: 0.76rem; color: var(--fog); margin-top: 0.15rem; font-style: italic; font-family: 'Cormorant Garamond', serif; font-weight: 300; }
  .ripple { position: absolute; border-radius: 50%; background: rgba(168,74,42,0.15); transform: scale(0); animation: rippleAnim 0.5s linear; pointer-events: none; }
  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }
  .completion { margin: 2rem 0 0; padding: 2rem; background: var(--ink); border-radius: 6px; text-align: center; color: var(--parch); display: none; animation: fadeUp 0.6s ease; position: relative; overflow: hidden; }
  .completion::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(196,146,42,0.2) 0%, transparent 70%); pointer-events: none; }
  .completion.show { display: block; }
  .completion-shell { font-size: 2.4rem; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }
  .completion h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600; margin: 0.5rem 0 0.3rem; color: var(--gold-pale); }
  .completion p { font-size: 0.88rem; color: var(--fog); font-weight: 300; }
  .footer { text-align: center; padding: 1.5rem 0 0; }
  .reset { background: none; border: 1px solid var(--parch-dark); color: var(--fog); font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.45rem 1.2rem; border-radius: 2px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .reset:hover { border-color: var(--rust); color: var(--rust); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--parch-dark); border-radius: 2px; }
</style>
</head>
<body>
<div class="hero">
  <div class="hero-inner">
    <div class="route-label">Camino Francés · Sarria → Santiago de Compostela</div>
    <h1>Checklist <em>del Pellegrino</em></h1>
    <div class="hero-sub">Tutto ciò che ti serve per percorrere gli ultimi 100 km</div>
    <div class="progress-area">
      <div class="progress-track"><div class="progress-fill" id="pFill"></div></div>
      <div class="progress-meta">
        <span id="pLabel">0 voci completate</span>
        <span class="progress-pct" id="pPct">0%</span>
      </div>
    </div>
  </div>
</div>
<div class="body" id="lists"></div>
<div class="body">
  <div class="completion" id="completionBanner">
    <div class="completion-shell">🐚</div>
    <h2>¡Buen Camino!</h2>
    <p>Lo zaino è pronto. Il cammino ti aspetta.</p>
  </div>
  <div class="footer"><button class="reset" onclick="resetAll()">Ricomincia da capo</button></div>
</div>
<script>
const CATEGORIES = [
  { icon: "🎒", name: "Zaino & Documenti", items: [
    { label: "Zaino 30–45 litri", hint: "Peso ideale: max 10% del proprio peso corporeo" },
    { label: "Credencial del Peregrino", hint: "Da timbrare (sello) ad ogni tappa" },
    { label: "Sacco lenzuolo (liner)", hint: "Obbligatorio nella maggior parte degli albergue" },
    { label: "Documento d'identità / passaporto" },
    { label: "Prenotazioni prime tappe confermate", hint: "Consigliato in alta stagione" },
  ]},
  { icon: "👟", name: "Abbigliamento & Calzature", items: [
    { label: "Scarponcini da trekking ben rodati", hint: "Fondamentale: non partire con scarpe nuove" },
    { label: "Sandali o ciabatte per la sera" },
    { label: "3 paia calzini tecnici anti-vesciche" },
    { label: "2 magliette traspiranti" },
    { label: "Pantaloni / leggings da trekking" },
    { label: "Giacca impermeabile leggera" },
    { label: "Cappello da sole e/o berretto" },
  ]},
  { icon: "🩹", name: "Salute & Primo Soccorso", items: [
    { label: "Cerotti per vesciche (Compeed)", hint: "L'essenziale del pellegrino" },
    { label: "Crema anti-sfregamento" },
    { label: "Ibuprofene / antidolorifico" },
    { label: "Disinfettante spray e cerotti normali" },
    { label: "Protezione solare SPF 50+" },
    { label: "Tessera sanitaria europea (TEAM/EHIC)" },
  ]},
  { icon: "📱", name: "Tecnologia", items: [
    { label: "App Buen Camino o Wise Pilgrim", hint: "Mappe offline delle tappe" },
    { label: "Powerbank carico (min. 10.000 mAh)" },
    { label: "Cavi di ricarica + adattatore EU" },
    { label: "Cuffie / auricolari" },
  ]},
  { icon: "✨", name: "Piccoli Essenziali", items: [
    { label: "Bastoni da trekking telescopici" },
    { label: "Borraccia o sacca idrica 1.5–2 L" },
    { label: "Snack energetici (barrette, frutta secca)" },
    { label: "Lucchetto per armadietto albergue" },
    { label: "Tappi per le orecchie" },
    { label: "Torcia frontale con batterie di riserva" },
  ]},
];
let state = {};
function save() { try { localStorage.setItem('camino_v2', JSON.stringify(state)); } catch(e) {} }
function load() { try { const d = localStorage.getItem('camino_v2'); if(d) state = JSON.parse(d); } catch(e) {} }
function countAll() { let total=0,done=0; CATEGORIES.forEach((c,ci)=>c.items.forEach((_,ii)=>{total++;if(state[`${ci}-${ii}`])done++;})); return {total,done}; }
function updateProgress() { const {total,done}=countAll(); const pct=total?Math.round(done/total*100):0; document.getElementById('pFill').style.width=pct+'%'; document.getElementById('pLabel').textContent=`${done} di ${total} completate`; document.getElementById('pPct').textContent=pct+'%'; document.getElementById('completionBanner').classList.toggle('show',done===total&&total>0); }
function toggleItem(ci,ii,el) { const key=`${ci}-${ii}`; state[key]=!state[key]; save(); el.classList.toggle('done',state[key]); const cat=CATEGORIES[ci]; const catDone=cat.items.filter((_,x)=>state[`${ci}-${x}`]).length; const head=document.querySelector(`.cat-head[data-ci="${ci}"]`); if(head){head.classList.toggle('all-done',catDone===cat.items.length);head.querySelector('.cat-tally').textContent=`${catDone}/${cat.items.length}`;} updateProgress(); }
function addRipple(e,el) { const rect=el.getBoundingClientRect(); const r=document.createElement('span'); r.className='ripple'; const size=Math.max(rect.width,rect.height); r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`; el.appendChild(r); setTimeout(()=>r.remove(),600); }
function render() { const container=document.getElementById('lists'); container.innerHTML=''; CATEGORIES.forEach((cat,ci)=>{ const catDone=cat.items.filter((_,ii)=>state[`${ci}-${ii}`]).length; const allDone=catDone===cat.items.length; const div=document.createElement('div'); div.className='category'; const head=document.createElement('div'); head.className='cat-head'+(allDone?' all-done':''); head.dataset.ci=ci; head.innerHTML=`<div class="cat-dot"></div><span class="cat-name">${cat.name}</span><span class="cat-tally">${catDone}/${cat.items.length}</span><span class="cat-icon">${cat.icon}</span>`; div.appendChild(head); cat.items.forEach((item,ii)=>{ const key=`${ci}-${ii}`; const isDone=!!state[key]; const row=document.createElement('div'); row.className='item'+(isDone?' done':''); row.innerHTML=`<div class="cb-wrap"><div class="cb-box"><div class="cb-check"><svg viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1"/></svg></div></div></div><div class="item-body"><div class="item-label">${item.label}</div>${item.hint?`<div class="item-hint">${item.hint}</div>`:''}</div>`; row.addEventListener('click',(e)=>{addRipple(e,row);toggleItem(ci,ii,row);}); div.appendChild(row); }); container.appendChild(div); }); updateProgress(); }
function resetAll() { state={}; save(); render(); }
load(); render();
</script>
</body>
</html>
