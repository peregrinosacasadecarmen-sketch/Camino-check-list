<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilgrim Checklist – Camino de Santiago</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1c1410;
    --rust: #a84a2a;
    --rust-light: #c96040;
    --gold: #c4922a;
    --gold-pale: #e8c97a;
    --parch: #f2ead8;
    --parch-dark: #e2d4b8;
    --fog: #b8a898;
    --white: #faf7f2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; background: var(--white); color: var(--ink); font-family: 'Jost', sans-serif; font-weight: 300; overflow-x: hidden; }

  /* HERO */
  .hero { background: var(--ink); color: var(--parch); padding: 2.8rem 2rem 2.2rem; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 50%, rgba(196,146,42,0.18) 0%, transparent 60%), radial-gradient(ellipse at 10% 80%, rgba(168,74,42,0.14) 0%, transparent 50%); pointer-events: none; }
  .hero-inner { position: relative; max-width: 580px; margin: 0 auto; }

  /* LANG SWITCHER */
  .lang-switcher { display: flex; gap: 0.4rem; margin-bottom: 1.4rem; }
  .lang-btn {
    background: none;
    border: 1px solid rgba(232,201,122,0.25);
    color: var(--fog);
    font-family: 'Jost', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 0.3rem 0.65rem;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .lang-btn:hover { border-color: rgba(232,201,122,0.5); color: var(--gold-pale); }
  .lang-btn.active { border-color: var(--gold-pale); color: var(--gold-pale); background: rgba(232,201,122,0.08); }

  .route-label { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-pale); margin-bottom: 0.8rem; opacity: 0; animation: slideIn 0.6s 0.1s ease forwards; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 6vw, 2.8rem); font-weight: 600; line-height: 1.05; color: var(--white); opacity: 0; animation: slideIn 0.6s 0.2s ease forwards; }
  .hero h1 em { font-style: italic; color: var(--gold-pale); }
  .hero-sub { margin-top: 0.5rem; font-size: 0.85rem; color: var(--fog); font-weight: 300; opacity: 0; animation: slideIn 0.6s 0.3s ease forwards; }

  /* WEIGHT SLIDER */
  .weight-area { margin-top: 1.8rem; opacity: 0; animation: slideIn 0.6s 0.35s ease forwards; }
  .weight-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.8rem; }
  .weight-label { font-size: 0.65rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--fog); }
  .weight-display { display: flex; align-items: baseline; gap: 0.3rem; }
  .weight-kg { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 600; color: var(--gold-pale); line-height: 1; transition: color 0.3s; }
  .weight-unit { font-size: 0.7rem; letter-spacing: 0.1em; color: var(--fog); text-transform: uppercase; }
  .weight-profile { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--rust-light); margin-top: 0.15rem; transition: color 0.3s; }

  .slider-wrap { position: relative; padding: 0.4rem 0; }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 2px; background: rgba(255,255,255,0.15); border-radius: 1px; outline: none; cursor: pointer; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--gold-pale); border: 2px solid var(--ink); box-shadow: 0 0 0 3px rgba(232,201,122,0.25); cursor: pointer; transition: box-shadow 0.2s, transform 0.2s; }
  input[type=range]::-webkit-slider-thumb:hover { box-shadow: 0 0 0 5px rgba(232,201,122,0.3); transform: scale(1.1); }
  input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--gold-pale); border: 2px solid var(--ink); cursor: pointer; }
  .slider-track-fill { position: absolute; top: 50%; left: 0; height: 2px; background: linear-gradient(90deg, var(--rust-light), var(--gold)); border-radius: 1px; pointer-events: none; transform: translateY(-50%); transition: width 0.2s; }
  .slider-labels { display: flex; justify-content: space-between; margin-top: 0.4rem; }
  .slider-labels span { font-size: 0.62rem; color: rgba(184,168,152,0.5); letter-spacing: 0.06em; }

  /* PROGRESS */
  .progress-area { margin-top: 1.4rem; opacity: 0; animation: slideIn 0.6s 0.4s ease forwards; }
  .progress-track { height: 2px; background: rgba(255,255,255,0.12); border-radius: 1px; overflow: hidden; margin-bottom: 0.5rem; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--rust-light), var(--gold)); border-radius: 1px; width: 0%; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); }
  .progress-meta { display: flex; justify-content: space-between; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--fog); }
  .progress-pct { color: var(--gold-pale); font-weight: 500; }

  /* BODY */
  .body { max-width: 580px; margin: 0 auto; padding: 0 1.4rem 3rem; }
  .category { margin-top: 2rem; opacity: 0; transform: translateY(16px); animation: fadeUp 0.5s ease forwards; }
  .category:nth-child(1) { animation-delay: 0.5s; }
  .category:nth-child(2) { animation-delay: 0.60s; }
  .category:nth-child(3) { animation-delay: 0.70s; }
  .category:nth-child(4) { animation-delay: 0.80s; }
  .category:nth-child(5) { animation-delay: 0.90s; }
  .category:nth-child(6) { animation-delay: 1.00s; }
  .category:nth-child(7) { animation-delay: 1.10s; }

  .cat-head { display: flex; align-items: center; gap: 0.7rem; padding-bottom: 0.6rem; border-bottom: 1px solid var(--parch-dark); margin-bottom: 0.3rem; }
  .cat-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--rust); flex-shrink: 0; transition: background 0.3s; }
  .cat-head.all-done .cat-dot { background: var(--gold); }
  .cat-name { font-family: 'Cormorant Garamond', serif; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--rust); transition: color 0.3s; }
  .cat-head.all-done .cat-name { color: var(--gold); }
  .cat-icon { font-size: 0.95rem; margin-left: auto; opacity: 0.7; }
  .cat-tally { font-size: 0.68rem; letter-spacing: 0.08em; color: var(--fog); margin-left: 0.3rem; }

  .item { display: flex; align-items: flex-start; gap: 0.85rem; padding: 0.65rem 0.5rem; cursor: pointer; border-radius: 4px; transition: background 0.15s; position: relative; overflow: hidden; }
  .item:hover { background: rgba(168,74,42,0.04); }
  .item:active { background: rgba(168,74,42,0.08); }
  .item.hidden { display: none; }

  .item-emoji { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; width: 24px; text-align: center; opacity: 0.85; transition: opacity 0.2s; }
  .item:hover .item-emoji { opacity: 1; }
  .item.done .item-emoji { opacity: 0.35; }
  .cb-wrap { width: 20px; height: 20px; flex-shrink: 0; margin-top: 1px; position: relative; }
  .cb-box { position: absolute; inset: 0; border: 1.5px solid var(--fog); border-radius: 3px; background: transparent; transition: border-color 0.2s, background 0.2s; display: flex; align-items: center; justify-content: center; }
  .cb-check { opacity: 0; transform: scale(0.4) rotate(-10deg); transition: opacity 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
  .cb-check svg { width: 11px; height: 11px; stroke: white; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .item.done .cb-box { background: var(--rust); border-color: var(--rust); }
  .item.done .cb-check { opacity: 1; transform: scale(1) rotate(0deg); }
  .item-body { flex: 1; min-width: 0; }
  .item-label { font-size: 0.97rem; font-weight: 400; line-height: 1.4; color: var(--ink); transition: color 0.25s; }
  .item.done .item-label { color: var(--fog); text-decoration: line-through; text-decoration-color: rgba(168,74,42,0.4); }
  .item-hint { font-size: 0.76rem; color: var(--fog); margin-top: 0.15rem; font-style: italic; font-family: 'Cormorant Garamond', serif; font-weight: 300; }

  .ripple { position: absolute; border-radius: 50%; background: rgba(168,74,42,0.15); transform: scale(0); animation: rippleAnim 0.5s linear; pointer-events: none; }
  @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

  .category.cat-hidden { display: none; }

  .completion { margin: 2rem 0 0; padding: 2rem; background: var(--ink); border-radius: 6px; text-align: center; color: var(--parch); display: none; animation: fadeUp 0.6s ease; position: relative; overflow: hidden; }
  .completion::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 0%, rgba(196,146,42,0.2) 0%, transparent 70%); pointer-events: none; }
  .completion.show { display: block; }
  .completion-shell { font-size: 2.4rem; animation: bounce 1s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }
  .completion h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; font-weight: 600; margin: 0.5rem 0 0.3rem; color: var(--gold-pale); }
  .completion p { font-size: 0.88rem; color: var(--fog); font-weight: 300; }

  .footer { text-align: center; padding: 1.5rem 0 0; }
  .reset { background: none; border: 1px solid var(--parch-dark); color: var(--fog); font-family: 'Jost', sans-serif; font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; padding: 0.45rem 1.2rem; border-radius: 2px; cursor: pointer; transition: border-color 0.2s, color 0.2s; }
  .reset:hover { border-color: var(--rust); color: var(--rust); }

  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--parch-dark); border-radius: 2px; }
</style>
</head>

<div class="hero">

    <div class="lang-switcher">

</div>

<div class="body" id="lists"></div>

<div class="body">

</div>

// ─── STATE ───────────────────────────────────────────────────────────────────
const MIN_W = 7, MAX_W = 10;
let currentLang = 'en';
let currentWeight = 7;
let state = {};

function save() {
  try { localStorage.setItem('camino_ml_v1', JSON.stringify({ state, weight: currentWeight, lang: currentLang })); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('camino_ml_v1');
    if(d) { const p = JSON.parse(d); state = p.state || {}; currentWeight = p.weight || 7; currentLang = p.lang || 'en'; }
  } catch(e) {}
}

function getProfile(w) {
  const t = T[currentLang];
  if(w <= 7.5) return t.profiles.ultralight;
  if(w <= 8.5) return t.profiles.standard;
  if(w <= 9.5) return t.profiles.comfortable;
  return t.profiles.full;
}

function updateStaticText() {
  const t = T[currentLang];
  document.getElementById('heroLabel').textContent = t.heroLabel;
  document.getElementById('heroTitle').innerHTML = t.heroTitle;
  document.getElementById('heroSub').textContent = t.heroSub;
  document.getElementById('weightLabel').textContent = t.weightLabel;
  document.getElementById('sliderL1').textContent = t.sliderLabels[0];
  document.getElementById('sliderL2').textContent = t.sliderLabels[1];
  document.getElementById('sliderL3').textContent = t.sliderLabels[2];
  document.getElementById('completionTitle').textContent = t.completionTitle;
  document.getElementById('completionSub').textContent = t.completionSub;
  document.getElementById('resetBtn').textContent = t.resetBtn;
  document.documentElement.lang = currentLang;
  // update lang buttons
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === currentLang);
  });
}

function updateSliderUI(w) {
  const pct = (w - MIN_W) / (MAX_W - MIN_W) * 100;
  document.getElementById('trackFill').style.width = pct + '%';
  document.getElementById('weightDisplay').textContent = w % 1 === 0 ? w : w.toFixed(1).replace('.', currentLang === 'en' ? '.' : ',');
  document.getElementById('weightProfile').textContent = getProfile(w);
  document.getElementById('weightSlider').value = w;
}

function isVisible(item) { return item.minWeight <= currentWeight; }

function countVisible() {
  let total = 0, done = 0;
  CATEGORIES[currentLang].forEach((c,ci) => c.items.forEach((item,ii) => {
    if(isVisible(item)) { total++; if(state[`${ci}-${ii}`]) done++; }
  }));
  return { total, done };
}

function updateProgress() {
  const { total, done } = countVisible();
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pLabel').textContent = T[currentLang].progressItems(done, total);
  document.getElementById('pPct').textContent = pct + '%';
  document.getElementById('completionBanner').classList.toggle('show', done === total && total > 0);
}

function applyWeightFilter() {
  CATEGORIES[currentLang].forEach((cat, ci) => {
    let visibleCount = 0;
    cat.items.forEach((item, ii) => {
      const row = document.querySelector(`.item[data-ci="${ci}"][data-ii="${ii}"]`);
      if(!row) return;
      const visible = isVisible(item);
      if(visible) { row.classList.remove('hidden'); visibleCount++; }
      else { row.classList.add('hidden'); }
    });
    const catEl = document.querySelector(`.category[data-ci="${ci}"]`);
    if(catEl) catEl.classList.toggle('cat-hidden', visibleCount === 0);
    const head = document.querySelector(`.cat-head[data-ci="${ci}"]`);
    if(head) {
      const done = cat.items.filter((item,ii) => isVisible(item) && state[`${ci}-${ii}`]).length;
      head.querySelector('.cat-tally').textContent = `${done}/${visibleCount}`;
      head.classList.toggle('all-done', visibleCount > 0 && done === visibleCount);
    }
  });
  updateProgress();
}

function toggleItem(ci, ii, el) {
  const key = `${ci}-${ii}`;
  state[key] = !state[key];
  save();
  el.classList.toggle('done', state[key]);
  applyWeightFilter();
}

function addRipple(e, el) {
  const rect = el.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  const size = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
  el.appendChild(r);
  setTimeout(() => r.remove(), 600);
}

function render() {
  const container = document.getElementById('lists');
  container.innerHTML = '';
  CATEGORIES[currentLang].forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'category';
    div.dataset.ci = ci;
    const visibleItems = cat.items.filter(item => isVisible(item));
    const doneItems = cat.items.filter((item,ii) => isVisible(item) && state[`${ci}-${ii}`]);
    const head = document.createElement('div');
    head.className = 'cat-head' + (visibleItems.length > 0 && doneItems.length === visibleItems.length ? ' all-done' : '');
    head.dataset.ci = ci;
    head.innerHTML = `<div class="cat-dot"></div><span class="cat-name">${cat.name}</span><span class="cat-tally">${doneItems.length}/${visibleItems.length}</span><span class="cat-icon">${cat.icon}</span>`;
    div.appendChild(head);
    cat.items.forEach((item, ii) => {
      const key = `${ci}-${ii}`;
      const isDone = !!state[key];
      const visible = isVisible(item);
      const row = document.createElement('div');
      row.className = 'item' + (isDone ? ' done' : '') + (visible ? '' : ' hidden');
      row.dataset.ci = ci;
      row.dataset.ii = ii;
      row.innerHTML = `
        <div class="cb-wrap"><div class="cb-box"><div class="cb-check"><svg viewBox="0 0 12 10"><polyline points="1,5 4.5,8.5 11,1"/></svg></div></div></div>
        ${item.emoji ? `<div class="item-emoji">${item.emoji}</div>` : ''}
        <div class="item-body">
          <div class="item-label">${item.label}</div>
          ${item.hint ? `<div class="item-hint">${item.hint}</div>` : ''}
        </div>`;
      row.addEventListener('click', (e) => { addRipple(e, row); toggleItem(ci, ii, row); });
      div.appendChild(row);
    });
    if(visibleItems.length === 0) div.classList.add('cat-hidden');
    container.appendChild(div);
  });
  updateProgress();
}

function setLang(lang) {
  currentLang = lang;
  save();
  updateStaticText();
  updateSliderUI(currentWeight);
  render();
}

function resetAll() { state = {}; save(); render(); updateProgress(); }

document.getElementById('weightSlider').addEventListener('input', function() {
  currentWeight = parseFloat(this.value);
  updateSliderUI(currentWeight);
  save();
  applyWeightFilter();
});

load();
updateStaticText();
updateSliderUI(currentWeight);
render();
</script>
